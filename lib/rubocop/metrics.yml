Metrics/BlockLength:
  # Ignore common sources of false positives.
  AllowedMethods:
    - ips # Benchmarking
    - new
  Exclude:
    - rakelib/**
    - test/**/*.rb

Metrics/ClassLength:
  # Ignore common sources of false positives. Especially when using multi-line
  # Arrays, Hashes, heredocs, and/or method calls.
  CountAsOne:
    - array
    - hash
    - heredoc
    - method_call
  Exclude:
    - test/**/*.rb

Metrics/MethodLength:
  # Ignore common sources of false positives. Especially when using multi-line
  # Arrays, Hashes, heredocs, and/or method calls.
  CountAsOne:
    - array
    - hash
    - heredoc
    - method_call

Metrics/ModuleLength:
  # Ignore common sources of false positives. Especially when using multi-line
  # Arrays, Hashes, heredocs, and/or method calls.
  CountAsOne:
    - array
    - hash
    - heredoc
    - method_call
