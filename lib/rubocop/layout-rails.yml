Layout/ClassStructure:
  # Establish a convention for code order within classes.
  Enabled: true
  AutoCorrect: false
  Categories:
    module_inclusion:
      - extend
      - include
      - prepend
    callbacks:
      - before_validation
      - after_validation
      - before_save
      - around_save
      - before_create
      - around_create
      - after_create
      - before_update
      - around_update
      - after_update
      - after_save
      - before_destroy
      - around_destroy
      - after_destroy
      - after_commit
      - after_rollback
      - after_initialize
      - after_find
    public_attribute_macros:
      - attr_accessor
      - attr_reader
      - attr_writer
      - serialize
    associations:
      - belongs_to
      - has_one
      - has_many
      - has_and_belongs_to_many
      - accepts_nested_attributes_for
    validations:
      - validates
      - validates_associated
      - validates_with
      - validates_each
    scopes:
      - scope
    concerning_blocks:
      - concerning
  ExpectedOrder:
    - constants
    - module_inclusion
    - callbacks
    - associations
    - validations
    - public_delegate
    - scopes
    - public_class_methods
    # - public_attribute_macros
    - initializer
    - public_methods
    - protected_attribute_macros
    - protected_methods
    - private_attribute_macros
    - private_delegate
    - private_methods
    - concerning_blocks

Layout/FirstMethodArgumentLineBreak:
  # Require line break before the first argument in a multi-line method call.
  # Example:
  #   my_method(
  #     a: 1,
  #     # ...
  Enabled: true
  AllowMultilineFinalElement: true
  AllowedMethods:
    - t
    - safe_join

Layout/LineLength:
  # Soft limit: 80 characters (use a "ruler" guide!). Hard limit: 100 chars.
  # See: https://rubystyle.guide/#max-line-length
  Max: 100
  Exclude:
    - Gemfile
    - config/environments/*.rb
    - config/routes.rb
    - db/seeds.rb

Layout/MultilineArrayLineBreaks:
  # Require each item in a multi-line Array to start on a separate line.
  # Example:
  #   [
  #     # ...
  #     c
  #   ]
  Exclude:
    - db/seeds.rb
