Naming/BlockParameterName:
  MinNameLength: 2
  AllowedNames:
    - f # FormBuilder
    - o # Option (for `with_options` blocks)
    - t # Task
  ForbiddenNames:
    - i # Index
    - x # ? (Too arbitrary)

Naming/MethodParameterName:
  AllowedNames:
    - as # Partials
    - db # Database
    - f # Form builders
    - id # Identification
    # Sorting:
    - a
    - b
    # Mailers:
    - cc
    - to
