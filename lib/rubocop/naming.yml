Naming/BlockParameterName:
  MinNameLength: 2
  AllowedNames:
    - o # Option (for `with_options` blocks)
    - t # Task
  ForbiddenNames:
    - i # Index
    - x # ? (Too arbitrary)
  Exclude:
    - "*.gemspec"

Naming/MethodParameterName:
  AllowedNames:
    - id # Identification
    # Sorting:
    - a
    - b

Naming/RescuedExceptionsVariableName:
  # `ex` is short and simple while also being more grep'able than `e`.
  PreferredName: ex
